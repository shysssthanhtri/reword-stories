services:
  postgres:
    image: postgres:16-alpine
    container_name: reword-stories-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: reword
      POSTGRES_PASSWORD: reword
      POSTGRES_DB: reword_stories
    volumes:
      - reword_stories_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reword -d reword_stories"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  reword_stories_pgdata:
